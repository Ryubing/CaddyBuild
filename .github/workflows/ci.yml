name: Ryubing Caddy Release

on:
  workflow_dispatch:
    inputs: {}

concurrency: release

permissions:
  contents: write

jobs:
  release:
    name: Release for linux-x64
    runs-on: ubuntu-latest
    steps:
      - name: Get version info
        id: version_info
        run: |
          echo "build_version=99.0.${{ github.run_number }}" >> $GITHUB_OUTPUT
        shell: bash
        
      - name: 'Install Go'
        uses: actions/setup-go@v6
        with:
          go-version: 1.26
          token: ${{ github.token }}

      - name: Install XCaddy
        run: |
          sudo apt install -y debian-keyring debian-archive-keyring apt-transport-https
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/xcaddy/gpg.key' | sudo gpg --dearmor -o /usr/share/keyrings/caddy-xcaddy-archive-keyring.gpg
          curl -1sLf 'https://dl.cloudsmith.io/public/caddy/xcaddy/debian.deb.txt' | sudo tee /etc/apt/sources.list.d/caddy-xcaddy.list
          sudo apt update
          sudo apt install xcaddy
        shell: bash

      - name: "Compile (${{ steps.version_info.outputs.build_version }})"
        run: | 
          xcaddy build master --output caddy
        shell: bash

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          name: "Ryubing Caddy V${{ steps.version_info.outputs.build_version }}"
          tag: ${{ steps.version_info.outputs.build_version }}
          artifacts: "caddy"
          immutableCreate: true
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
